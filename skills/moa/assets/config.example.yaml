# 复制为工作目录下的 config.yaml 后使用。API key 一律走环境变量,不要写进文件。
#
# 通道(channel,design.md §4.2):
#   api      CH3。openrouter(默认,一个 OPENROUTER_API_KEY 调所有厂商) / openai(兼容端点,可自带 base_url/api_key_env)。
#   cli      CH2。codex exec 非交互(prompt 走 stdin、-s read-only、--output-last-message 取 JSON、
#            --skip-git-repo-check、--ephemeral)。走 codex 自身鉴权,不需 key。model 用 codex 侧 ID。
#   subagent CH1。仲裁人用 Task 机制脚本外派发(可指定非会话默认模型),产物写入同一 collect-dir。
#            moa.py 遇到此通道会跳过(留给仲裁人)。
#
# fallback: 通道降级链,按序尝试。仲裁人永不降级——fallback 只降委员席位。
# 代理(重要): LLM 连接必须走代理。脚本自动读取 http_proxy/https_proxy/no_proxy,对非 no_proxy
#   主机(如 openrouter.ai)构建 ProxyHandler,api 调用优先走代理;启动会打印 "[proxy] detected env proxy"。
#   自查: python3 -c "import sys;sys.path.insert(0,'skills/moa/scripts');import moa;print(moa.PROXIES, moa._bypass_proxy('openrouter.ai'))"
#   —— bypass 应为 False(=走代理)。CH2 codex 与 CH1 子代理走各自进程,同样继承 shell 的 *_proxy 环境变量。
#   排障提示: 过代理后仍 HTTP 404 = 该 key 真不服务此模型(list-only),不是代理问题(gpt-5 同代理可通即为证)。
# 默认为 2026-07 各家顶级模型(异构四家族 A/B/C/D)。模型 ID 迭代快,正式运行前对照核对一次。
#
# ── slug 核对备忘(2026-07-12 二次实测,对某 OPENROUTER key;不同 key 供给不同,自行复核)──
# 查全量可用 slug:  curl -s https://openrouter.ai/api/v1/models -H "Authorization: Bearer $OPENROUTER_API_KEY" | jq -r '.data[].id'
# 验证可服务性(清单存在 ≠ 可调,list-only 会 404):最小 max_tokens>=1500 实调一次,看 http200 vs 404。
#   ★ 推理模型陷阱: gpt-5.6-sol / gemini-3.1-pro-preview 在 max_tokens 很小时推理吃光额度、content
#     返空壳 ——【假阴性】,非不可用。核对给足 max_tokens(>=1500);正式跑 review/brainstorm 用
#     options.max_tokens_member=3000,decide 长输出建议 >=8000(3000 下推理模型易空壳)。
#   ✔ 实测可服务(http200): openai/gpt-5.6-sol, openai/gpt-5, openai/gpt-5-codex,
#     google/gemini-3.1-pro-preview, google/gemini-2.5-pro, anthropic/claude-opus-4.8
#   ✘ 在清单里但端点 404(list-only): x-ai/grok-4.5(及 grok-4.x 全系), deepseek/deepseek-v3.2
#   → 此 key 只实际服务 OpenAI/Google/Anthropic 三族;要 xAI 第四族需换有 x-ai 供给的 key,
#     否则 D 席 grok 会 404 → 走其 fallback(牺牲第四家族多样性)。
#   (注:上一版备忘曾误记 openai/gpt-5.6-sol「不存在」;2026-07-12 复测为 http200 可服务,已订正。)

# 注: 下面 name 里的 reasoning/coding/fact/adversarial 只是"为何选这个模型"的助记标签(name 仅用于产物文件名);
#     每席在各模式下的**实际角色**由 seat 字母决定(review: A=可行性质疑 B=可维护性 C=安全审计 D=用户代言;
#     brainstorm 另一套,见 skills/moa/scripts/moa.py 的 DEFAULT_SEAT_ROLE 与 references/roles-*.md)。
#     即 review 模式下 seat C(名 fact-c)跑的是 security_auditor,不是"事实核查";要固定角色就显式设 member.role。
members:
  - name: reasoning-a          # A 席: 选它做逻辑推理/方案权衡(review 角色=可行性质疑者)
    seat: A
    channel: cli               # codex 走订阅,省钱
    # model 省略 → 用 codex 默认(GPT-5 级);codex(ChatGPT 账号)不接受显式 -m,给了会 400。
    # codex_bin: codex         # 可选:codex 可执行文件名/路径,默认 "codex"(不在 PATH 或改名时才需设)
    cli_extra: ["-c", "model_reasoning_effort=high"]
    timeout_seconds: 240
    fallback:
      - {channel: api, protocol: openrouter, model: openai/gpt-5.6-sol}   # ✔ 2026-07-12 实测 http200

  - name: coding-b             # B 席: 代码理解/工程实现
    seat: B
    channel: subagent          # Claude 子代理走订阅、不计费(仲裁人脚本外派发)。
    model: claude-opus-4-8     # 纯 subagent、不挂 api fallback:挂了 moa.py 会判为可派发、
                               # 直接走计费 API(仲裁人也不再免费派发它),等于白丢订阅优势。
                               # 需 API 兜底时另配一个 api 席,别把 fallback 挂在订阅席上。

  - name: fact-c               # C 席: 事实核查(尽量开搜索接地)
    seat: C
    channel: api
    protocol: openrouter
    model: google/gemini-3.1-pro-preview
    timeout_seconds: 240       # Gemini 系较慢,单独放宽

  - name: adversarial-d        # D 席: 用户体验/反方红队
    seat: D
    channel: subagent          # CH1: 再派一个 Claude Opus 4.8 子代理扮演反方角色(默认 role=user_advocate)。
    model: claude-opus-4-8     # 与 B 同模型、不同角色 = 主动 Self-MoA:角色分化即出多样性(§9.2),
                               # 且走订阅不计费、省 token。纯 subagent(无 api fallback)→ moa.py 跳过,
                               # 由仲裁人 Task 外派发(加了 api fallback 反而会让脚本走计费 API,失去省 token 意义)。
    # ↑ 想要 xAI 第四族真·跨模型去相关(需该 key 有 x-ai 供给)时,把上面 channel/model 两行换成:
    #     channel: api
    #     protocol: openrouter
    #     model: x-ai/grok-4.5      # 多数 key 为 list-only 404,先按上文备忘实调核对

# 仲裁人 = 当前 agent(带完整上下文),不在此配置,不走外部调用。

options:
  max_tokens_member: 3000      # review/brainstorm 够用;decide + 推理模型长输出建议调到 >=8000
  timeout_seconds: 180         # 全局默认;member 级 timeout_seconds 覆盖之
  min_successful_members: 2    # 运行时取 min(此值, 席位数),避免 L1 单委员被误杀
  grace_seconds: 30            # 达法定席位数后,给落伍者的宽限窗
  # max_refine_rounds: 2       # 仅供仲裁人参考的约定值,脚本不消费(轮数由 CLI --round / --refine-rounds 决定)
  # 温度: 未设 member.temperature_generate 时,脚本按模式取默认——brainstorm=0.9(求发散),
  # review/decide=0.3(求稳定判断)。要覆盖就在 member 上显式设 temperature_generate。

custom_roles: {}               # 内联自定义角色。键名填入 member.role 即生效。
# custom_roles:
#   test_coverage_skeptic: |
#     你是测试覆盖质疑者。只问: 哪些路径没被测试覆盖? 回归风险在哪?
